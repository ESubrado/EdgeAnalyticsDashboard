services:
  # Server (Node.js/Express)
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: edgeanalytics-server
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: development
    volumes:
      - ./src:/app/src
      - ./node_modules:/app/node_modules
    command: npm run dev
