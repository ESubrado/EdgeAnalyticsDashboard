version: '3.8'

services:
  # Server (Node.js/Express)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: development
    container_name: edgeanalytics-server
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
    volumes:
      - ./server/src:/app/src
      - ./server/node_modules:/app/node_modules
    command: npm run dev
